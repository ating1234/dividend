name: Deploy Worker

on:
  push:
    branches:
      - main
    paths:
      - 'cloudflare-version/src/**'
      - 'cloudflare-version/wrangler.jsonc'
      - 'cloudflare-version/package.json'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker to Cloudflare
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd cloudflare-version
          npm install

      - name: Generate wrangler types
        run: |
          cd cloudflare-version
          npx wrangler types

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'cloudflare-version'
